<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space · Jingyao Gong</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --line: #d9d9d9;
      --text: #1f1f1c;
      --text-2: #5f5b53;
      --text-3: #8b867d;
      --accent: #606c68;
      --accent-2: #707d92;
      --content: 720px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, "Noto Serif", Georgia, serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      padding: 80px 24px 120px;
      display: flex;
      justify-content: center;
    }
    main {
      max-width: var(--content);
      width: 100%;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: var(--text-3);
      margin-bottom: 48px;
    }
    .divider {
      border: none;
      border-top: 1px solid var(--line);
      margin: 32px 0;
    }
    p {
      font-size: 1rem;
      color: var(--text-2);
      margin-bottom: 16px;
    }
    a {
      color: var(--accent-2);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
    }
    a:hover { border-bottom-color: var(--accent-2); }
    .links {
      list-style: none;
      margin-top: 24px;
    }
    .links li {
      margin-bottom: 12px;
      font-size: 0.95rem;
      color: var(--text-2);
    }
    .links li::before {
      content: "—";
      margin-right: 8px;
      color: var(--text-3);
    }
    footer {
      margin-top: 64px;
      font-size: 0.85rem;
      color: var(--text-3);
    }
  </style>
</head>
<body>
  <main>
    <h1>Space</h1>
    <p class="subtitle">Jingyao Gong · Personal Page</p>
    <hr class="divider">
    <p>
      A lightweight personal space for sharing projects, notes, and occasional writings.
    </p>
    <ul class="links">
      <li><a href="https://github.com/jingyaogong">GitHub</a></li>
    </ul>
    <footer>Jingyao Gong</footer>
  </main>
</body>
</html>
